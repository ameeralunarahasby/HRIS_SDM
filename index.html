<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Langsung ke Google Drive</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .upload-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 95%;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 8px;
            font-size: 22px;
        }
        p {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 20px;
        }
        /* Mengatur tampilan kotak upload iframe */
        iframe {
            width: 100%;
            height: 350px;
            border: 2px dashed #3498db;
            border-radius: 8px;
            background: #fafafa;
        }
    </style>
</head>
<body>

    <div class="upload-container">
        <h2>Area Unggah File Cloud</h2>
        <p>Pilih file atau seret (drag & drop) langsung ke kotak di bawah ini</p>
        
        <iframe src="https://driveuploader.com/upload/W2whAnwu52/" allow="camera"></iframe>
    </div>

</body>
</html>
