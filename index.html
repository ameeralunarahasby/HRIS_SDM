<form id="upload-form">
    <div class="file-input-wrapper">
        <input type="file" id="file-field" class="file-input" required>
    </div>
    <button type="submit" class="btn-submit">Mulai Unggah File</button>
</form>
<div id="status-message"></div>

<script>
    const form = document.getElementById('upload-form');
    const fileField = document.getElementById('file-field');
    const statusMsg = document.getElementById('status-message');
    
    // Paste URL Google Apps Script (/exec) milikmu di bawah ini
    const scriptUrl = "PASTE_URL_GOOGLE_APPS_SCRIPT_KAMU_DISINI";

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        statusMsg.style.color = '#1a73e8';
        statusMsg.textContent = 'Sedang mengunggah ke Google Drive...';

        const file = fileField.files[0];
        const reader = new FileReader();

        reader.onloadend = function() {
            // Mengubah file menjadi format string base64 agar bisa dibaca Apps Script
            const base64String = reader.result;
            
            const payload = new URLSearchParams();
            payload.append("attachment", base64String);
            payload.append("fileName", file.name);

            fetch(scriptUrl, {
                method: 'POST',
                body: payload,
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            })
            .then(res => res.json())
            .then(data => {
                if(data.result === "success") {
                    statusMsg.style.color = '#2ecc71';
                    statusMsg.textContent = '✓ Berhasil! Sertifikat telah tersimpan langsung di Google Drive.';
                    form.reset();
                } else {
                    statusMsg.style.color = '#e74c3c';
                    statusMsg.textContent = 'Gagal menyimpan: ' + data.error;
                }
            })
            .catch(err => {
                statusMsg.style.color = '#e74c3c';
                statusMsg.textContent = 'Terjadi kesalahan jaringan.';
            });
        };

        reader.readAsDataURL(file);
    });
</script>
