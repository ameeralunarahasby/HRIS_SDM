<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Data Pegawai RS</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="file"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background-color: #007BFF; color: white; border: none; cursor: pointer; border-radius: 4px; width: 100%; font-size: 16px; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        #statusMessage { text-align: center; font-weight: bold; margin-top: 15px; padding: 10px; border-radius: 4px; display: none; }
    </style>
</head>
<body>

    <h2>Form Input Data Pegawai Baru</h2>
    
    <form id="pegawaiForm">
        <div class="form-group">
            <label for="id_pegawai">ID Pegawai</label>
            <input type="text" id="id_pegawai" name="id_pegawai" placeholder="Misal: RS-001" required>
        </div>
        <div class="form-group">
            <label for="nama">Nama Lengkap</label>
            <input type="text" id="nama" name="nama" placeholder="Misal: Budi Santoso" required>
        </div>
        <hr>
        <h3>Upload Dokumen</h3>
        
        <div class="form-group">
            <label for="foto">Pas Foto (jpg/png)</label>
            <input type="file" id="foto" name="foto" accept="image/*">
        </div>
        <div class="form-group">
            <label for="ktp">Scan KTP (pdf/jpg)</label>
            <input type="file" id="ktp" name="ktp" accept="application/pdf,image/*">
        </div>
        <button type="submit" id="submitBtn">Simpan Data</button>
        <div id="statusMessage"></div>
    </form>

    <script src="script.js"></script>

</body>
</html>
